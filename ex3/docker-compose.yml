services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb-ex3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=onboarding_ex_03_db
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data

volumes:
  timescaledb-data: